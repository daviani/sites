  - titleFr: Stack IA locale — Outillage DDD appliqué
    titleEn: Local AI Stack — Applied DDD Tooling
    start: '2025'
    end: En cours
    descriptionFr: >-
      Outillage perso IA-first pensé en DDD : éléments globaux partagés
      (Qdrant vectoriel natif via launchd, Ollama + nomic-embed-text en local,
