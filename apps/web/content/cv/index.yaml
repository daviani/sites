      connectés, 10 hooks shell (protect-main, block-ai-mention, auto-recall
      contexte Qdrant), 9 skills et 7 plugins configurés.
    descriptionEn: >-
      AI-first personal tooling designed with a DDD mindset: shared global
      layer (native Qdrant via launchd, Ollama + nomic-embed-text running
      locally, Claude Code/Desktop) and domain-specific tools on top. Custom
      MCP server in Python (~940 LOC) sharing persistent memory between
      Claude Desktop and Claude Code across 5 Qdrant collections. 18 connected
      MCP servers, 10 shell hooks (protect-main, block-ai-mention,
      Qdrant-context auto-recall), 9 skills and 7 plugins.
    highlightsFr: []
    highlightsEn: []
