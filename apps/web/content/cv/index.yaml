    roleFr: Développeur Senior Full-Stack et DevOps
    roleEn: Senior Full-Stack & DevOps Developer
    locationFr: Lyon
    locationEn: Lyon, France
    summaryFr: >-
      Seul développeur depuis mars 2025, 6 applications (internes,
      clients, site vitrine), 11 serveurs. Workflow Agile sur Jira/Confluence.
    summaryEn: >-
      Sole developer since March 2025, 6 applications (internal, client,
      showcase website), 11 servers
    highlightsFr:
      - >-
        Développement front Angular et Next.js : création de nouvelles vues
        métier (listings, écrans de détail, formulaires de saisie), refonte de
        composants existants, formulaires complexes avec validation côté client
        (Reactive Forms côté Angular, React Hook Form côté Next.js), gestion
        d'état (services Angular, hooks React) et intégration d'APIs REST,
        dashboards avec tableaux filtrables, fonctionnalités d'export CSV et PDF
      - >-
        Accessibilité et résolution cross-stack : intégration de composants
        accessibles RGAA (landmarks, ARIA, focus clavier, formulaires),
        adaptation du CMS headless pour la conformité des contenus éditoriaux,
        résolution d'une boucle d'authentification cross-origin (Angular :
        withCredentials, intercepteur HTTP ; ASP.NET Core : configuration CORS,
        cookies SameSite)
      - >-
        Développement back .NET Core : architecture multi-tenant (gestion DNS
        sous-domaines par client, certificats SSL/TLS, bindings IIS), migrations
        Entity Framework Core (3 000+ lignes sur 2 applications, validées sans
        régression), renforcement de contrat d'API (validation DTO,
        UserFriendlyException) suite à l'identification d'une faille de
        validation
      - >-
        Scripts PostgreSQL de migration et correction de données en production :
        backups versionnés par timestamp, mécanismes de rollback, guards
        anti-doublons, ré-alignement des séquences ; automatisation du dump prod
        de 1h manuelle à 5 min
      - >-
        Mise en place complète de la chaîne CI/CD (GitLab CI, Jenkins, Docker) :
        pipelines, rollback automatique, environnements de preprod from scratch,
        et review apps dynamiques par MR — environnement complet front Angular +
        API .NET + binding IIS + wildcard SSL déployé à chaque pull request
      - >-
        Administration Windows Server, IIS et sécurisation infra : déploiements
        multi-environnements, bindings, certificats SSL/TLS, scripts PowerShell,
        monitoring/alerting, rotation backups, détection d'intrusions SSH ;
        résolution d'incidents complexes (correction SQL de masse 300+ lignes en
        production, hotfix compilation .NET débloquant 4 pipelines simultanés)
    highlightsEn:
      - >-
        Complete CI/CD pipeline setup (GitLab CI, Jenkins, Docker): pipelines,
        review apps, automatic rollback, preprod environment creation — before:
        manual deployments directly to production
      - >-
        Multi-tenant .NET architecture: per-client DNS subdomain management,
        SSL/TLS certificates, IIS bindings
      - >-
        Entity Framework migration: 3,000+ lines across 2 applications,
        validated without regression
      - >-
        DB operations automation: prod dump reduced from 1h manual to 5 min via
        secured scripts
      - >-
        Infrastructure hardening: recurring outage resolution, backup rotation,
        monitoring/alerting, SSH intrusion detection, server access security
      - >-
        RGAA accessibility fixes on showcase website and client applications:
        implementation of external audit recommendations (landmarks, ARIA,
        keyboard focus, forms) and headless CMS adaptation for editorial content
        compliance
    stack:
